<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <img src="profile-pic.jpg" alt="Profile Picture" class="profile-pic">
                <input type="text" placeholder="Search or start new chat" class="search-bar">
            </div>
            <div class="contact-list">
                <div class="contact">
                    <img src="contact-pic.jpg" alt="Contact Picture" class="contact-pic">
                    <div class="contact-info">
                        <span class="contact-name">John Doe</span>
                        <span class="contact-last-message">Hey, how are you?</span>
                    </div>
                </div>
                <!-- Add more contacts here -->
            </div>
        </div>
        <div class="chat-window">
            <div class="chat-header">
                <img src="contact-pic.jpg" alt="Contact Picture" class="contact-pic">
                <span class="contact-name">John Doe</span>
            </div>
            <div class="chat-body">
                <div class="message received">
                    <p>Hello!</p>
                    <span class="timestamp">12:00 PM</span>
                </div>
                <div class="message sent">
                    <p>Hi there!</p>
                    <span class="timestamp">12:01 PM</span>
                </div>
                <!-- Add more messages here -->
            </div>
            <div class="chat-footer">
                <input type="text" placeholder="Type a message" class="message-input">
                <button class="send-btn">Send</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
